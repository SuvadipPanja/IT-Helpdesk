<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <!-- N letter stylized as connected nodes (Nexus = connection) -->
  <path d="M152 380V132l104 186.67L360 132v248" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Connection dots (nexus nodes) -->
  <circle cx="152" cy="132" r="24" fill="url(#accent)"/>
  <circle cx="360" cy="132" r="24" fill="url(#accent)"/>
  <circle cx="152" cy="380" r="24" fill="url(#accent)"/>
  <circle cx="360" cy="380" r="24" fill="url(#accent)"/>
</svg>
