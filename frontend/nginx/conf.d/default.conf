server {
    listen 80;
    server_name _;

    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;

    # ── Production security headers ──────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    # Stop MIME-type sniffing
    add_header X-Content-Type-Options    "nosniff"                              always;
    # Legacy XSS filter (belt-and-braces for older browsers)
    add_header X-XSS-Protection          "1; mode=block"                        always;
    # Control Referer leakage to third-party origins
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    # Restrict powerful browser features; allow microphone for AI voice input
    add_header Permissions-Policy        "camera=(), microphone=(self), geolocation=(), payment=(), usb=()" always;
    # Content-Security-Policy: self + data/blob URIs required by React, recharts, jspdf
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self' blob:; object-src 'none'; worker-src 'self' blob:; frame-ancestors 'self';" always;
    # HSTS — enforce HTTPS for 1 year (enable when TLS is configured)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Remove X-Powered-By / Server info leakage (nginx.conf also sets server_tokens off)
    # ──────────────────────────────────────────────────────────────────────

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
