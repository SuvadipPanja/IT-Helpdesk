# ╔══════════════════════════════════════════════════════════════╗
# ║  NGINX Main Config — Production Tuned                     ║
# ║  Optimized for 1000+ concurrent users                     ║
# ╚══════════════════════════════════════════════════════════════╝

# Auto-detect CPU cores for worker processes
worker_processes auto;

# Max open files per worker
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker
    worker_connections 4096;
    # Accept multiple connections at once
    multi_accept on;
    # Use epoll on Linux for better performance
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging format with request timing ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ── Timeouts ──
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ── Buffer sizes ──
    types_hash_max_size 2048;
    server_names_hash_bucket_size 64;

    # ── Hide nginx version ──
    server_tokens off;

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
